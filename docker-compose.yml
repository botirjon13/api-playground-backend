services:
  postgres:
    image: postgres:16-alpine
    container_name: api-playground-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: api_playground
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d api_playground"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: api-playground-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/api_playground?schema=public
      JWT_SECRET: local-docker-development-secret
      JWT_EXPIRES_IN: 1d
    ports:
      - "3000:3000"

volumes:
  postgres_data:
